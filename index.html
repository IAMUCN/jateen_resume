<!DOCTYPE html>
<html>
<head>
    <title>Jateen Kumar Barik - Resume</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }

        .top-bar {
            background: black;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: #00c853;
            color: white;
            padding: 18px 32px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 20px;
            display: inline-block;
        }

        /* Different color for download */
        .download-btn {
            background: #2962ff;
        }

        iframe {
            width: 100%;
            height: 95vh;
            border: none;
        }

        .mobile-msg {
            display: none;
            padding: 20px;
        }

        /* Hide VIEW button on desktop */
        .view-btn {
            display: none;
        }

        /* 📱 Mobile Optimization */
        @media (max-width: 768px) {

            iframe {
                display: none;
            }

            .mobile-msg {
                display: block;
            }

            .btn {
                font-size: 24px;
                padding: 20px;
                width: 90%;
                margin: 12px auto;
                display: block;
            }

            /* Show VIEW button only on mobile */
            .view-btn {
                display: block;
            }
        }
    </style>
</head>

<body>

<!-- 🔝 Buttons -->
<div class="top-bar">
    <a class="btn view-btn" href="resume.pdf" target="_blank">📄 OPEN RESUME</a>
    <button class="btn download-btn" onclick="downloadPDF()">⬇ DOWNLOAD RESUME</button>
</div>

<!-- 📱 Mobile Message -->
<div class="mobile-msg">
    <h2>Resume Preview</h2>
    <p>Tap above to view or download</p>
</div>

<!-- 💻 Desktop PDF Viewer -->
<iframe src="resume.pdf"></iframe>

<!-- 🔧 Force download script -->
<script>
function downloadPDF() {
    const link = document.createElement('a');
    link.href = 'resume.pdf';
    link.download = 'Jateen_Resume.pdf';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
