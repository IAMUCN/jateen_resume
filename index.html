<!DOCTYPE html>
<html>
<head>
    <title>Resume</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }

        .top-bar {
            background: black;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

.btn {
    background: #00c853;
    color: white;
    padding: 18px 32px;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 20px;
    display: inline-block;
    width: auto;
}

/* 🚀 Mobile Boost */
@media (max-width: 768px) {
    .btn {
        font-size: 24px;      /* bigger text */
        padding: 20px;        /* bigger button */
        width: 90%;           /* full-width feel */
        margin: 12px auto;
        display: block;
        border-radius: 12px;
    }
}

        iframe {
            width: 100%;
            height: 95vh;
            border: none;
        }

        .mobile-msg {
            display: none;
            padding: 20px;
        }

        @media (max-width: 768px) {
            iframe {
                display: none;
            }

            .mobile-msg {
                display: block;
            }

            .btn {
                font-size: 22px;
                padding: 18px 30px;
                width: 85%;
                margin: 10px auto;
                display: block;
            }
        }
    </style>
</head>

<body>

<div class="top-bar">
        <button class="btn" onclick="downloadPDF()">⬇ Download Resume</button>
</div>

<div class="mobile-msg">
    <h2>Resume Preview</h2>
    <p>Tap above to view or download</p>
</div>

<iframe src="resume.pdf"></iframe>

<script>
function downloadPDF() {
    const link = document.createElement('a');
    link.href = 'resume.pdf';
    link.download = 'Jateen_Resume.pdf';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>

</body>
</html>
