<!DOCTYPE html>
<html>
<head>
    <title>Jateen Kumar Barik - Resume</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }

        .top-bar {
            background: black;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: #00c853;
            color: white;
            padding: 16px 28px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 20px;
            display: inline-block;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00a844;
        }

        iframe {
            width: 100%;
            height: 95vh;
            border: none;
        }

        .mobile-msg {
            display: none;
            padding: 20px;
        }

        /* 📱 Mobile Optimization */
        @media (max-width: 768px) {
            iframe {
                display: none;
            }

            .mobile-msg {
                display: block;
            }

            .btn {
                font-size: 22px;
                padding: 18px 30px;
                width: 85%;
                margin: 10px auto;
                display: block;
            }
        }
    </style>
</head>

<body>

<!-- 🔝 Buttons -->
<div class="top-bar">
    <a class="btn" href="resume.pdf" target="_blank">📄 View Resume</a>
    <a class="btn" href="resume.pdf" download>⬇ Download Resume</a>
</div>

<!-- 📱 Mobile Message -->
<div class="mobile-msg">
    <h2>Resume Preview</h2>
    <p>Tap the buttons above to view or download the resume</p>
</div>

<!-- 💻 Desktop PDF Viewer -->
<iframe src="resume.pdf"></iframe>

</body>
</html>
