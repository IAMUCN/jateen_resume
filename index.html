<!DOCTYPE html>
<html>
<head>
    <title>Resume</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }

        .top-bar {
            background: black;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            background: #00c853;
            color: white;
            padding: 14px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 18px;
        }

        iframe {
            width: 100%;
            height: 95vh;
            border: none;
        }

        /* Mobile message */
        .mobile-msg {
            display: none;
            padding: 20px;
        }

        @media (max-width: 768px) {
            iframe {
                display: none;
            }
            .mobile-msg {
                display: block;
            }
        }
    </style>
</head>

<body>

<div class="top-bar">
    <a class="btn" href="resume.pdf" target="_blank">📄 View Resume</a>
    <a class="btn" href="resume.pdf" download>⬇ Download Resume</a>
</div>

<!-- Mobile UI -->
<div class="mobile-msg">
    <h2>Resume Preview</h2>
    <p>Click below to view or download</p>
</div>

<!-- Desktop PDF viewer -->
<iframe src="resume.pdf"></iframe>

</body>
</html>
